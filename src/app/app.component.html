<ion-app>
  <ion-split-pane contentId="main" when="lg">
    <ion-menu contentId="main" class="sidebar-menu">
      <ion-content>
        <!-- Logo Area -->
        <div class="logo-container">
          <h1 class="logo-text">AI</h1>
          <h2>AI Photo Frame</h2>
          <p>Welcome, [User Name]</p>
        </div>

        <!-- Navigation -->
        <ion-list class="nav-list" lines="none">
          <ion-item button routerLink="/home" routerDirection="root" class="active">
            <ion-icon name="home-outline" slot="start"></ion-icon>
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item button>
            <ion-icon name="color-palette-outline" slot="start"></ion-icon>
            <ion-label>Editor</ion-label>
          </ion-item>
          <ion-item button>
            <ion-icon name="cube-outline" slot="start"></ion-icon>
            <ion-label>Orders</ion-label>
          </ion-item>
          <ion-item button>
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-label>Profile</ion-label>
          </ion-item>
        </ion-list>
      </ion-content>
    </ion-menu>

    <!-- Main Content Area -->
    <div class="ion-page" id="main">
      <ion-router-outlet></ion-router-outlet>
    </div>
  </ion-split-pane>
</ion-app>
