<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>AI Studio</ion-title>
    <ion-button slot="end" fill="clear" color="light">
      <!-- Settings or Profile Icon placeholder -->
      <ion-icon name="person-circle-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" color="dark">
  
  <!-- Header & Actions -->
  <div class="actions-section">
    <ion-button expand="block" shape="round" color="primary" class="main-action-btn shadow-lg" (click)="openEditorModal()">
      <ion-icon name="images-outline" slot="start"></ion-icon>
      Nueva Foto
    </ion-button>
    <ion-button expand="block" shape="round" fill="outline" color="light" class="secondary-action-btn shadow-lg" (click)="openEditorModal()">
      <ion-icon name="camera-outline" slot="start"></ion-icon>
      Cámara
    </ion-button>
  </div>

  <!-- Inspiración (Prioridad 1) -->
  <div class="section-container">
    <h2>Galería de Inspiración</h2>
    <div class="horizontal-carousel">
      <div class="carousel-item shadow-lg rounded-2xl" 
           *ngFor="let inspo of inspirations" 
           (click)="openEditorModal(inspo.style)"
           [style.background-image]="'url(' + inspo.image + ')'">
        <div class="badge">Estilo</div>
        <div class="item-overlay">
          <span class="item-title">{{ inspo.style }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Tu Estudio (Prioridad 2) -->
  <div class="section-container">
    <h2>Tus Creaciones</h2>
    
    <div class="empty-state rounded-2xl shadow-lg" *ngIf="creations.length === 0">
      <ion-icon name="color-palette-outline"></ion-icon>
      <p>Aún no tienes arte. ¡Empieza subiendo una foto!</p>
    </div>
    
    <div class="horizontal-carousel" *ngIf="creations.length > 0">
      <div class="carousel-item shadow-lg rounded-2xl" *ngFor="let creation of creations">
        <!-- Content for user creations -->
      </div>
    </div>
  </div>

  <!-- Pedidos (Prioridad 3) -->
  <div class="section-container">
    <h2>Pedidos Recientes</h2>
    
    <ion-list class="orders-list rounded-2xl shadow-lg" lines="none">
      <ion-item *ngFor="let order of orders" color="medium" class="order-item">
        <ion-icon name="cube-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <h3>Pedido #{{ order.id }}</h3>
          <p>{{ order.date }}</p>
        </ion-label>
        <ion-text slot="end" color="success">
          <small>{{ order.status }}</small>
        </ion-text>
      </ion-item>
    </ion-list>
  </div>

</ion-content>
