<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title>Pedido Confirmado</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="dark" class="ion-padding">
  <div class="confirmation-container">
    <div class="success-icon">
      <!-- SVG Checkmark -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>
    
    <h1>¡Gracias por tu compra!</h1>
    <p>Tu arte generado por IA está siendo preparado para impresión y pronto será enmarcado.</p>
    
    <div class="order-number-box" *ngIf="orderId">
      <small>Número de Pedido</small>
      <strong>{{ orderId }}</strong>
    </div>

    <ion-button expand="block" shape="round" color="primary" (click)="goHome()">
      Volver al Inicio
    </ion-button>
  </div>
</ion-content>
